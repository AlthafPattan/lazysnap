name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint & Typecheck ──────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm typecheck

  # ─── Unit Tests ───────────────────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test --coverage

      - name: Upload coverage to Codecov
        if: matrix.node == 20
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/core/coverage/lcov.info
          flags: core
          fail_ci_if_error: false

  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build all packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @lazysnap/core
        run: pnpm --filter @lazysnap/core build

      - name: Build @lazysnap/react
        run: pnpm --filter @lazysnap/react build

      - name: Build @lazysnap/angular
        run: pnpm --filter @lazysnap/angular build

      - name: Verify dist outputs exist
        run: |
          test -f packages/core/dist/index.js
          test -f packages/core/dist/index.d.ts
          test -f packages/react/dist/index.js
          test -f packages/react/dist/index.d.ts
          test -f packages/angular/dist/index.js
          test -f packages/angular/dist/index.d.ts
          echo "✅ All dist outputs verified"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: |
            packages/*/dist
          retention-days: 7

  # ─── Bundle Size Check ────────────────────────────────────────────────────
  bundle-size:
    name: Bundle size check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check core bundle size (must be < 5KB minzipped)
        run: |
          SIZE=$(npx gzip-size-cli packages/core/dist/index.js)
          echo "Core bundle size: $SIZE"
          # Fail if over 5120 bytes (5KB)
          BYTES=$(npx gzip-size-cli --raw packages/core/dist/index.js)
          if [ "$BYTES" -gt 5120 ]; then
            echo "❌ Core bundle exceeds 5KB limit: $BYTES bytes"
            exit 1
          fi
          echo "✅ Core bundle size OK: $BYTES bytes"
